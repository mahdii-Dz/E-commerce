name = "my-express-backend"
main = "index.js"  
compatibility_date = "2025-09-09"
compatibility_flags = ["nodejs_compat"]

[env.production]
name = "my-express-backend-production"
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1